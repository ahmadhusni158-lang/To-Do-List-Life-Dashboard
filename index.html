<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Dashboard</h1>
    <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
  </header>

  <main class="grid">

    <!-- Greeting Widget -->
    <section class="widget" id="widget-greeting">
      <h2 id="greeting-text">Good morning</h2>
      <p id="greeting-time"></p>
      <p id="greeting-date"></p>
      <div class="name-form">
        <input type="text" id="name-input" placeholder="Enter your name" aria-label="Your name" />
        <button id="name-submit">Set Name</button>
      </div>
    </section>

    <!-- Timer Widget -->
    <section class="widget" id="widget-timer">
      <h2>Focus Timer</h2>
      <div id="timer-display" aria-live="polite">25:00</div>
      <div class="timer-controls">
        <button id="timer-start">Start</button>
        <button id="timer-stop" disabled>Stop</button>
        <button id="timer-reset">Reset</button>
      </div>
      <div class="timer-duration">
        <input type="number" id="timer-duration-input" min="1" max="120" value="25" aria-label="Timer duration in minutes" />
        <button id="timer-duration-set">Set</button>
      </div>
    </section>

    <!-- Todo Widget -->
    <section class="widget" id="widget-todo">
      <h2>To-Do List</h2>
      <div class="todo-form">
        <input type="text" id="todo-input" placeholder="Add a task..." aria-label="New task title" />
        <button id="todo-submit">Add</button>
      </div>
      <p id="todo-error" class="error" aria-live="polite"></p>
      <ul id="todo-list" aria-label="Task list"></ul>
    </section>

    <!-- Quick Links Widget -->
    <section class="widget" id="widget-links">
      <h2>Quick Links</h2>
      <div class="links-form">
        <input type="text" id="link-label-input" placeholder="Label" aria-label="Link label" />
        <input type="url" id="link-url-input" placeholder="https://..." aria-label="Link URL" />
        <button id="link-submit">Add</button>
      </div>
      <p id="link-error" class="error" aria-live="polite"></p>
      <ul id="links-list" aria-label="Quick links"></ul>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
